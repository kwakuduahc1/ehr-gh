<nav class="navbar" [class.open]="menuOpen()">
        <div class="nav-container">
                <!-- Logo/Brand -->
                <div class="nav-brand">
                        <h1>SHIMS</h1>
                </div>

                <!-- Hamburger Menu Button -->
                <button type="button" class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()"
                        aria-label="Toggle navigation menu" title="Toggle navigation menu">
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                        <span class="hamburger-line"></span>
                </button>

                <!-- Navigation Menu -->
                <ul class="nav-menu" [class.active]="menuOpen()" role="menubar">
                        <!-- Home Item -->
                        <li class="nav-item" role="none">
                                <a class="nav-link" routerLink="/home" (click)="onNavLinkClick()" role="menuitem">
                                        <mat-icon class="nav-icon">home</mat-icon>
                                        <span>Home</span>
                                </a>
                        </li>
                        @if(status.isLoggedIn()){
                        <!-- Management Dropdown -->
                        <li class="nav-item dropdown" role="none">
                                <button type="button" class="nav-link dropdown-toggle"
                                        [matMenuTriggerFor]="managementMenu" title="Management submenu" role="menuitem">
                                        <mat-icon class="nav-icon">admin_panel_settings</mat-icon>
                                        <span>Management</span>
                                        <mat-icon class="dropdown-icon">expand_more</mat-icon>
                                </button>
                        </li>

                        <!-- Records Dropdown -->
                        <li class="nav-item dropdown" role="none">
                                <button type="button" class="nav-link dropdown-toggle" [matMenuTriggerFor]="recordsMenu"
                                        title="Records submenu" role="menuitem">
                                        <mat-icon class="nav-icon">folder_shared</mat-icon>
                                        <span>Records</span>
                                        <mat-icon class="dropdown-icon">expand_more</mat-icon>
                                </button>
                        </li>

                        <!-- Account Dropdown -->
                        <li class="nav-item dropdown" role="none">
                                <button type="button" class="nav-link dropdown-toggle" [matMenuTriggerFor]="accountMenu"
                                        title="Account submenu" role="menuitem">
                                        <mat-icon class="nav-icon">account_circle</mat-icon>
                                        <span>Account</span>
                                        <mat-icon class="dropdown-icon">expand_more</mat-icon>
                                </button>
                        </li>
                        }
                        @else {
                        <!-- Login Button -->
                        <li class="nav-item" role="none">
                                <button type="button" mat-stroked-button class="nav-login" (click)="login()"
                                        role="menuitem" title="Login to your account">
                                        <mat-icon class="nav-icon">login</mat-icon>
                                        <span>Login</span>
                                </button>
                        </li>
                        }
                </ul>
        </div>
</nav>

<!-- Management Menu -->
<mat-menu #managementMenu="matMenu" panelClass="nav-menu-panel">
        <a mat-menu-item routerLink="/users" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">people</mat-icon>
                <span>Users</span>
        </a>
        <a mat-menu-item routerLink="/schemes" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">layers</mat-icon>
                <span>Schemes</span>
        </a>
        <a mat-menu-item routerLink="/settings" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">settings</mat-icon>
                <span>Settings</span>
        </a>
</mat-menu>

<!-- Records Menu -->
<mat-menu #recordsMenu="matMenu" panelClass="nav-menu-panel">
        <a mat-menu-item routerLink="/registrations" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">how_to_reg</mat-icon>
                <span>Registrations</span>
        </a>
        <a mat-menu-item routerLink="/registrations/search" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">event_available</mat-icon>
                <span>Attendances</span>
        </a>
</mat-menu>

<!-- Account Menu -->
<mat-menu #accountMenu="matMenu" panelClass="nav-menu-panel">
        <a mat-menu-item routerLink="/profile" (click)="onNavLinkClick()">
                <mat-icon class="nav-icon">person</mat-icon>
                <span>Profile</span>
        </a>
        <button mat-button mat-menu-item type="button" (click)="logout()" title="Logout from your account">
                <mat-icon class="nav-icon">logout</mat-icon>
                <span>Logout</span>
        </button>
</mat-menu>
