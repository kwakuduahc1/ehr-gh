<h1>Registrations</h1>
<button type="button" mat-button title="Register new patient" (click)="addRegistration()">
    <mat-icon>person_add</mat-icon> New registration
</button>
<table class="table">
    <thead>
        <th>Hospital ID</th>
        <th>Full Name</th>
        <th>Age</th>
        <th>Sex</th>
        <th>Ghana Card</th>
        <th>Actions</th>
    </thead>
    <tbody>
        @for (p of list(); track p.patientsID) {
        <tr>
            <td>{{p.hospitalID}}</td>
            <td>{{p.fullName}}</td>
            <td>{{p.age}}</td>
            <td>{{p.sex}}</td>
            <td>{{p.ghanaCard}}</td>
            <td>
                <button (click)="viewInsurance(p)" mat-button type="button" title="View insurance for {{p.fullName}}">
                    <mat-icon>health_and_safety</mat-icon> Insurance
                </button>
                <button (click)="addRegistration(p)" mat-button type="button" title="Edit {{p.fullName}}">
                    <mat-icon>edit</mat-icon> Edit
                </button>
                <button (click)="deleteRegistration(p.patientsID)" mat-button color="warn" type="button"
                    title="Delete {{p.fullName}}">
                    <mat-icon>delete</mat-icon> Delete
                </button>
            </td>
        </tr>
        }
    </tbody>
</table>
